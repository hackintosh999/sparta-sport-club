<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPARTA | Элитный Спортивный Центр</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&family=Russo+One&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            russo: ['"Russo One"', 'sans-serif'],
            manrope: ['"Manrope"', 'sans-serif'],
          },
          colors: {
            sparta: {
              black: '#050505',
              dark: '#0A0A0A',
              gold: '#D4AF37',
              'gold-light': '#FCD34D',
              'gold-dark': '#B45309',
            }
          },
          backgroundImage: {
            'gold-gradient': 'linear-gradient(135deg, #FCD34D 0%, #D4AF37 50%, #B45309 100%)',
            'glass-dark': 'linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%)',
            'site-bg': "url('/site-bg.png')",
            'hero-bg': "url('/bg-hero.png')",
            'why-us-bg': "url('/bg-why-us.png')",
            'programs-bg': "url('/bg-programs.png')",
            'team-bg': "url('/bg-team.png')",
            'faq-bg': "url('/bg-faq.png')",
          }
        }
      }
    }
  </script>
  <style>
    /* Custom scrollbar for luxury feel */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #050505;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #D4AF37;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.30.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-sparta-black text-white antialiased selection:bg-sparta-gold selection:text-black">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
